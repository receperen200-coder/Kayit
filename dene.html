<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stats System</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:40px;
}

.box{
  background:#222;
  padding:20px;
  width:300px;
  margin:10px auto;
  border-radius:10px;
}

h2{
  color:#00ffcc;
}
</style>
</head>

<body>

<h2>📊 Firebase Stats System</h2>

<div class="box">
<h3 id="openCount">Açılma: 0</h3>
<h3 id="deviceCount">Cihaz: 0</h3>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBYPFtYnDPkvgbDAYp5pkK92oRljW3I",
  authDomain: "kayitsistemi-dbe5f.firebaseapp.com",
  databaseURL: "https://kayitsistemi-dbe5f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kayitsistemi-dbe5f",
  storageBucket: "kayitsistemi-dbe5f.appspot.com",
  messagingSenderId: "416813344508",
  appId: "1:416813344508:web:18acea1dee3d6781301979"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* DEVICE ID */
const deviceId = localStorage.getItem("deviceId") || crypto.randomUUID();
localStorage.setItem("deviceId", deviceId);

/* ===================== OPEN COUNT ===================== */
const openRef = ref(db, "stats/openCount");

get(openRef).then((snap) => {
  let value = snap.val();
  if(value === null || value === undefined) value = 0;

  value = Number(value) + 1;

  set(openRef, value);

  document.getElementById("openCount").innerText =
    "Açılma: " + value;
});

/* ===================== DEVICE COUNT ===================== */
const deviceRef = ref(db, "stats/devices/" + deviceId);

set(deviceRef, true);

get(ref(db, "stats/devices")).then((snap) => {

  const data = snap.val() || {};
  const count = Object.keys(data).length;

  document.getElementById("deviceCount").innerText =
    "Cihaz: " + count;

});

</script>

</body>
</html>
