<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sayaç Sistemi</title>
</head>

<body style="background:#111;color:white;text-align:center;font-family:Arial">

<h2>🔥 Sayaç Sistemi</h2>

<h3 id="openCount">Açılma: 0</h3>
<h3 id="deviceCount">Cihaz: 0</h3>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 SENİN FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBYPFtYnDPkvgbDAYp5pkK92oRljW3I",
  authDomain: "kayitsistemi-dbe5f.firebaseapp.com",
  databaseURL: "https://kayitsistemi-dbe5f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kayitsistemi-dbe5f",
  storageBucket: "kayitsistemi-dbe5f.firebasestorage.app",
  messagingSenderId: "416813344508",
  appId: "1:416813344508:web:18acea1dee3d6781301979"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 📱 CİHAZ ID */
const deviceId = localStorage.getItem("deviceId") || crypto.randomUUID();
localStorage.setItem("deviceId", deviceId);

/* ===================== AÇILMA SAYACI ===================== */
async function updateOpenCount() {
  const snap = await get(ref(db, "openCount"));
  let count = snap.val() || 0;
  count++;
  await set(ref(db, "openCount"), count);

  document.getElementById("openCount").innerText = "Açılma: " + count;
}

/* ===================== CİHAZ SAYACI ===================== */
async function updateDeviceCount() {
  await set(ref(db, "devices/" + deviceId), true);

  const snap = await get(ref(db, "devices"));
  const data = snap.val() || {};

  const count = Object.keys(data).length;

  document.getElementById("deviceCount").innerText = "Cihaz: " + count;
}

/* 🚀 ÇALIŞTIR */
updateOpenCount();
updateDeviceCount();

</script>

</body>
</html>
